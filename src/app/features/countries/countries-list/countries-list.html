<!-- Parent loops through data -->
@if (countries().length) {
  <div class="grid grid-cols-1 gap-8 p-8 md:grid-cols-2 lg:grid-cols-4 lg:max-w-7xl lg:mx-auto">
     @for (country of countries(); track country.name.common) { 
      <!-- For each country in the array, the parent creates a new child component and passes ONE country to it. -->
      <!--app-country-card is the child component , ely bwdelo eahc country-->
      <!-- Parent passes data DOWN to child -->
       <!-- [country] -> child ,,, "country" ->value from parent el heya fl @for country<- of countries() -->
      <app-country-card [country]="country" />
    }
  </div>
}
