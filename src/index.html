<!doctype html>
<html lang="en">
  <!--<head> (ingredients) -> it is the section where you put things that need to load BEFORE the page shows-->
  <head>
    <meta charset="utf-8" />

    <title>RestCountries</title>

    <base href="/" /> <!--base url for routing , it tells Angular all URLs start from root -->

    <!--the next tag makes site responsive on mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link rel="icon" type="image/x-icon" href="favicon.ico" />

    <!--established Connection 1: To find the font-->
    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <!--established Connection 2: To download the actual font file-->
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Nunito+Sans:opsz,wght@6..12,300;6..12,600;6..12,800&display=swap"
      rel="stylesheet"
    />

  </head>

  <body>
    <app-root></app-root>
  </body>

</html>
